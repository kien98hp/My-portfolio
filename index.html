<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENDERVISION</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gap: 20px; 
            --bg-color: #ffffff;
            --text-color: #000000;
            --muted-color: #888888;
            --header-h: 120px; 
            --side-padding: var(--gap); 
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        header {
            padding: 2.5rem var(--side-padding);
            display: flex; justify-content: flex-start; align-items: center;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); gap: 4rem; 
        }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; color: var(--text-color); text-decoration: none; }
        nav { font-size: 1rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 2rem; }
        .nav-link { cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-link:hover { opacity: 1; }
        .nav-link.active { opacity: 1; text-decoration: underline; text-underline-offset: 8px; }
        
        /* Nút Back đã được loại bỏ theo yêu cầu */
        #back-btn { display: none; }

        main { padding: var(--header-h) var(--side-padding) 5rem; display: flex; flex-direction: column; gap: var(--gap); min-height: 100vh; }

        /* HERO SECTION */
        .hero-text { padding: 5vh 0 7vh; text-align: center; }
        .hero-text h1 {
            font-size: clamp(4.3rem, 1vw, 2rem); 
            font-weight: 700;
            line-height: 1.3;
            text-transform: none;
            letter-spacing: 0.01em; 
            word-spacing: 0.01em; 
            margin: 0 auto;
            max-width: 100%;
            white-space: nowrap;
            color: var(--text-color);
        }

        /* HOME GRID */
        #main-grid-container { display: flex; flex-direction: column; gap: var(--gap); }
        .grid-row { display: grid; gap: var(--gap); width: 100%; }
        .row-2 { grid-template-columns: repeat(2, 1fr); }
        .row-2 .project-item { aspect-ratio: 1 / 1; }
        .row-3 { grid-template-columns: repeat(3, 1fr); }
        .row-3 .project-item { aspect-ratio: 4 / 5; }
        .row-4 { grid-template-columns: repeat(4, 1fr); }
        .row-4 .project-item { aspect-ratio: 3 / 4; }

        .project-item { position: relative; overflow: hidden; background: #f7f7f7; cursor: pointer; display: flex; align-items: flex-end; }
        .project-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .project-item:hover img { transform: scale(1.05); }

        .project-meta { 
            position: relative; z-index: 2; text-align: center; width: 100%; padding-bottom: var(--gap); 
            padding-top: 40px; pointer-events: none; opacity: 0; transform: translateY(10px); 
            transition: var(--transition);
            background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
        }
        .project-item:hover .project-meta { opacity: 1; transform: translateY(0); }
        .project-category { font-size: 0.6rem; text-transform: uppercase; color: rgba(255,255,255,0.9); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
        .project-title { font-size: 1rem; font-weight: 800; text-transform: uppercase; color: #fff; padding: 0 15px; letter-spacing: 0.5px; }

        /* GALLERY DETAIL LAYOUT */
        #gallery-grid-container { display: flex; flex-direction: column; gap: var(--gap); }
        .gallery-row { display: flex; gap: var(--gap); width: 100%; align-items: stretch; }
        .gallery-item { position: relative; overflow: hidden; background: #f0f0f0; flex: 1; }
        .gallery-item img { width: 100%; height: 100%; display: block; object-fit: cover; }

        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .project-info { padding: 0 0 3rem 0; max-width: 800px; }
        .project-info h1 { font-size: 2.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 1rem; }
        .project-info .desc-vn { font-size: 1.1rem; color: var(--text-color); line-height: 1.6; font-weight: 400; }
        .project-info .desc-en { font-size: 0.95rem; color: var(--muted-color); line-height: 1.6; font-style: italic; margin-top: 0.5rem; }

        /* CONTACT SECTION */
        #contact-view { min-height: calc(100vh - var(--header-h)); display: none; flex-direction: column; justify-content: center; align-items: center; }
        #contact-view.active { display: flex; }
        .contact-content { width: 100%; max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1.3fr 1fr; gap: 8rem; padding: 4rem 0; }
        .contact-left h2 { font-size: 5.2rem; font-weight: 900; line-height: 1.05; text-transform: uppercase; letter-spacing: -3px; margin-bottom: 2.5rem; }
        .contact-left p { font-size: 1.45rem; color: var(--muted-color); max-width: 500px; }
        .contact-links { display: flex; flex-direction: column; gap: 2rem; justify-content: center; padding-left: 5rem; }
        .social-link { display: flex; align-items: center; gap: 1.5rem; text-decoration: none; color: var(--text-color); font-size: 1.55rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; padding: 1.3rem 0; border-bottom: 2px solid #eee; }
        .social-link i { font-size: 2rem; width: 35px; text-align: center; }
        .social-link:hover { color: var(--muted-color); padding-left: 20px; border-bottom-color: #000; }

        @media (max-width: 1024px) {
            .row-4 { grid-template-columns: repeat(2, 1fr); }
            .contact-content { grid-template-columns: 1fr; gap: 4rem; padding: 2rem; }
            .contact-links { padding-left: 0; }
            .contact-left h2 { font-size: 4rem; }
        }

        @media (max-width: 768px) {
            :root { --gap: 12px; --header-h: 100px; }
            header { gap: 1rem; padding: 1.5rem var(--side-padding); }
            .logo { font-size: 1.1rem; }
            nav { gap: 1rem; font-size: 0.85rem; }
            .hero-text h1 { font-size: clamp(0.8rem, 4vw, 1.2rem); letter-spacing: 0.05em; }
            .grid-row { grid-template-columns: 1fr !important; }
            .gallery-row { flex-direction: column !important; }
            .contact-left h2 { font-size: 3rem; }
        }
    </style>
</head>

        const homeView = document.getElementById('home-view');
        const projectView = document.getElementById('project-view');
        const contactView = document.getElementById('contact-view');
        const views = [homeView, projectView, contactView];

        const homeGridContainer = document.getElementById('main-grid-container');
        const galleryGridContainer = document.getElementById('gallery-grid-container');
        const logoBtn = document.getElementById('logo-btn');
        const contactNavLink = document.getElementById('contact-nav-link');
        const homeNavLink = document.getElementById('home-nav-link');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderHomeGrid() {
            homeGridContainer.innerHTML = '';
            let dataIdx = 0;
            let lastRowType = null;
            let deck = [];

            while(dataIdx < projects.length) {
                if (deck.length === 0) {
                    let newDeck = [2, 3, 4];
                    shuffle(newDeck);
                    if (lastRowType && newDeck[0] === lastRowType) {
                        [newDeck[0], newDeck[1]] = [newDeck[1], newDeck[0]];
                    }
                    deck = newDeck;
                }

                const count = deck.shift();
                lastRowType = count;

                const row = document.createElement('div');
                row.className = `grid-row row-${count}`;
                
                for(let i=0; i<count; i++) {
                    if(projects[dataIdx]) {
                        const item = document.createElement('div');
                        item.className = 'project-item';
                        const p = projects[dataIdx];
                        item.innerHTML = `
                            <img src="${p.thumb}">
                            <div class="project-meta">
                                <div class="project-category">${p.cat}</div>
                                <div class="project-title">${p.title}</div>
                            </div>
                        `;
                        item.onclick = () => {
                            updateURL({ project: p.id });
                            openProject(p);
                        };
                        row.appendChild(item);
                        dataIdx++;
                    }
                }
                homeGridContainer.appendChild(row);
            }
        }

        async function renderGalleryAuto(urls) {
            galleryGridContainer.innerHTML = '<div style="padding: 2rem; font-weight:900; text-transform:uppercase; opacity:0.5;">Loading visual data...</div>';
            
            const photoData = await Promise.all(urls.map(url => {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve({ src: url, ratio: img.width / img.height });
                    img.onerror = () => resolve({ src: url, ratio: 1 });
                    img.src = url;
                });
            }));

            galleryGridContainer.innerHTML = '';
            let i = 0;
            while (i < photoData.length) {
                const row = document.createElement('div');
                row.className = 'gallery-row';
                let itemsInRow = [];
                let currentWeight = 0;
                while (i < photoData.length && currentWeight < 2.2) {
                    const photo = photoData[i];
                    itemsInRow.push(photo);
                    currentWeight += photo.ratio > 1.2 ? 1.2 : 0.8;
                    i++;
                }
                itemsInRow.forEach(img => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.style.flex = `${img.ratio} 1 0%`; 
                    item.innerHTML = `<img src="${img.src}">`;
                    row.appendChild(item);
                });
                galleryGridContainer.appendChild(row);
            }
        }

        // NAVIGATION LOGIC
        function switchView(targetView, saveHistory = false) {
            window.scrollTo(0, 0);
            views.forEach(v => v.classList.remove('active'));
            targetView.classList.add('active');
            
            const isHome = targetView === homeView;
            const isContact = targetView === contactView;
            const isProject = targetView === projectView;

            // Highlight nav links
            homeNavLink.classList.toggle('active', isHome || isProject);
            contactNavLink.classList.toggle('active', isContact);

            if(saveHistory) {
                let viewName = 'work';
                if(isContact) viewName = 'contact';
                updateURL({ view: viewName });
            }
        }

        function openProject(p) {
            switchView(projectView);
            document.getElementById('view-title').innerText = p.title;
            document.getElementById('view-desc-vn').innerText = p.desc;
            document.getElementById('view-desc-en').innerText = p.descEn || "";
            renderGalleryAuto(p.gallery);
        }

        // HISTORY MANAGEMENT
        function updateURL(params) {
            const url = new URL(window.location);
            url.search = ""; // Clear old params
            Object.keys(params).forEach(key => url.searchParams.set(key, params[key]));
            window.history.pushState(params, "", url);
        }

        function handleRouting() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('project');
            const view = urlParams.get('view');

            if (projectId) {
                const p = projects.find(item => item.id == projectId);
                if (p) {
                    openProject(p);
                } else {
                    switchView(homeView);
                }
            } else if (view === 'contact') {
                switchView(contactView);
            } else {
                switchView(homeView);
            }
        }

        // LISTENERS
        logoBtn.onclick = () => { updateURL({ view: 'work' }); switchView(homeView); };
        homeNavLink.onclick = () => { updateURL({ view: 'work' }); switchView(homeView); };
        contactNavLink.onclick = () => { updateURL({ view: 'contact' }); switchView(contactView); };

        window.onpopstate = () => {
            handleRouting();
        };

        // INITIALIZE
        renderHomeGrid();
        handleRouting();
    </script>
</body>
</html>
