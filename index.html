    <style>
        :root {
            --gap: 20px; 
            --bg-color: #ffffff;
            --text-color: #000000;
            --muted-color: #888888;
            --header-h: 140px; 
            --side-padding: var(--gap); 
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        header {
            padding: 3rem var(--side-padding);
            display: flex; justify-content: flex-start; align-items: center;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); gap: 4rem; 
        }
        .logo { font-size: 1.65rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; color: var(--text-color); text-decoration: none; }
        nav { font-size: 1.15rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 2.5rem; }
        .nav-link { cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-link:hover { opacity: 1; }
        .nav-link.active { opacity: 1; text-decoration: underline; text-underline-offset: 8px; }
        
        #back-btn { display: none; cursor: pointer; border: 2px solid #000; padding: 0.6rem 1.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 900; text-transform: uppercase; margin-left: auto; }

        main { padding: var(--header-h) var(--side-padding) 5rem; display: flex; flex-direction: column; gap: var(--gap); min-height: 100vh; }

        /* HOME GRID */
        #main-grid-container { display: flex; flex-direction: column; gap: var(--gap); }
        .grid-row { display: grid; gap: var(--gap); width: 100%; }
        .row-2 { grid-template-columns: repeat(2, 1fr); }
        .row-2 .project-item { aspect-ratio: 1 / 1; }
        .row-3 { grid-template-columns: repeat(3, 1fr); }
        .row-3 .project-item { aspect-ratio: 4 / 5; }

        .project-item { position: relative; overflow: hidden; background: #f7f7f7; cursor: pointer; display: flex; align-items: flex-end; }
        .project-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .project-item:hover img { transform: scale(1.05); }

        .project-meta { position: relative; z-index: 2; text-align: center; width: 100%; padding-bottom: var(--gap); pointer-events: none; }
        .project-category { font-size: 0.6rem; text-transform: uppercase; color: #fff; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .project-title { font-size: 1.45rem; font-weight: 800; text-transform: uppercase; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        /* GALLERY DETAIL LAYOUT */
        #gallery-grid-container { display: flex; flex-direction: column; gap: var(--gap); }
        .gallery-row { display: flex; gap: var(--gap); width: 100%; align-items: stretch; }
        .gallery-item { position: relative; overflow: hidden; background: #f0f0f0; flex: 1; }
        .gallery-item img { width: 100%; height: 100%; display: block; object-fit: cover; }

        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .project-info { padding: 0 0 4rem 0; max-width: 900px; }
        .project-info h1 { font-size: 3.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        .project-info p { font-size: 1.1rem; color: var(--muted-color); line-height: 1.6; }

        /* CONTACT SECTION */
        .contact-content { max-width: 1200px; margin: 0 auto; padding-top: 5vh; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
        .contact-left h2 { font-size: 5rem; font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: -4px; margin-bottom: 2rem; }
        .contact-left p { font-size: 1.25rem; color: var(--muted-color); max-width: 400px; }
        .contact-links { display: flex; flex-direction: column; gap: 1.5rem; justify-content: center; }
        .social-link { display: flex; align-items: center; gap: 1.5rem; text-decoration: none; color: var(--text-color); font-size: 1.5rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; padding: 1rem 0; border-bottom: 1px solid #eee; }
        .social-link i { font-size: 1.8rem; width: 30px; text-align: center; }
        .social-link:hover { color: var(--muted-color); padding-left: 10px; border-bottom-color: #000; }

        @media (max-width: 992px) {
            .contact-content { grid-template-columns: 1fr; gap: 2rem; }
            .contact-left h2 { font-size: 3.5rem; }
        }

        @media (max-width: 768px) {
            :root { --gap: 10px; --header-h: 110px; }
            header { gap: 1.5rem; padding: 2rem var(--side-padding); }
            .logo { font-size: 1.2rem; }
            nav { gap: 1.5rem; font-size: 0.9rem; }
            .gallery-row { flex-direction: column !important; }
            .contact-left h2 { font-size: 2.5rem; letter-spacing: -1px; }
        }
    </style>

        function renderHomeGrid() {
            homeGridContainer.innerHTML = '';
            const pattern = [3, 2];
            let dataIdx = 0, pIdx = 0;
            while(dataIdx < projects.length) {
                const count = pattern[pIdx % pattern.length];
                const row = document.createElement('div');
                row.className = `grid-row row-${count}`;
                for(let i=0; i<count; i++) {
                    if(projects[dataIdx]) {
                        const item = document.createElement('div');
                        item.className = 'project-item';
                        const p = projects[dataIdx];
                        item.innerHTML = `<img src="${p.thumb}"><div class="project-meta"><div class="project-category">${p.cat}</div><div class="project-title">${p.title}</div></div>`;
                        item.onclick = () => openProject(p);
                        row.appendChild(item);
                        dataIdx++;
                    }
                }
                homeGridContainer.appendChild(row);
                pIdx++;
            }
        }

        async function renderGalleryAuto(urls) {
            galleryGridContainer.innerHTML = '<div style="padding: 2rem; font-weight:900; text-transform:uppercase; opacity:0.5;">Loading visual data...</div>';
            
            const photoData = await Promise.all(urls.map(url => {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve({ src: url, ratio: img.width / img.height });
                    img.src = url;
                });
            }));

            galleryGridContainer.innerHTML = '';
            
            let i = 0;
            while (i < photoData.length) {
                const row = document.createElement('div');
                row.className = 'gallery-row';
                
                // Thuật toán: Gom nhóm theo hàng để tối ưu hóa không gian. 
                // Mỗi hàng sẽ cố gắng chứa 2 hoặc 3 ảnh tùy thuộc vào độ rộng của chúng.
                let itemsInRow = [];
                let currentWeight = 0;
                
                // Trọng số ảnh dựa trên tỷ lệ (ảnh ngang nặng hơn ảnh dọc)
                // Cố gắng lấp đầy trọng số khoảng 2-3 đơn vị mỗi hàng
                while (i < photoData.length && currentWeight < 2.2) {
                    const photo = photoData[i];
                    itemsInRow.push(photo);
                    // Ảnh ngang (ratio > 1.2) tính 1.2 điểm, ảnh dọc/vuông tính 0.8 điểm
                    currentWeight += photo.ratio > 1.2 ? 1.2 : 0.8;
                    i++;
                }

                itemsInRow.forEach(img => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    // Sử dụng tỷ lệ thực tế để làm giá trị flex-grow giúp các ảnh đều tăm tắp về chiều cao
                    item.style.flex = `${img.ratio} 1 0%`; 
                    item.innerHTML = `<img src="${img.src}">`;
                    row.appendChild(item);
                });
                
                galleryGridContainer.appendChild(row);
            }
        }

        function switchView(targetView) {
            window.scrollTo(0, 0);
            views.forEach(v => v.classList.remove('active'));
            targetView.classList.add('active');
            
            const isHome = targetView === homeView;
            const isContact = targetView === contactView;

            backBtn.style.display = (isHome || isContact) ? 'none' : 'block';
            homeNavLink.classList.toggle('active', isHome);
            contactNavLink.classList.toggle('active', isContact);
        }

        function openProject(p) {
            switchView(projectView);
            document.getElementById('view-title').innerText = p.title;
            document.getElementById('view-desc').innerText = p.desc;
            renderGalleryAuto(p.gallery);
        }

        logoBtn.onclick = () => switchView(homeView);
        homeNavLink.onclick = () => switchView(homeView);
        contactNavLink.onclick = () => switchView(contactView);
        backBtn.onclick = () => switchView(homeView);

        renderHomeGrid();
    </script>
</body>
</html>
